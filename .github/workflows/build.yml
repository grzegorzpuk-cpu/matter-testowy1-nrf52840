name: Build Matter nRF52840

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.1.1

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          path: project

      - name: Cache NCS west modules
        uses: actions/cache@v4
        with:
          path: /workdir/ncs
          key: ncs-v3.1.1-${{ runner.os }}
          restore-keys: |
            ncs-v3.1.1-

      - name: Initialize NCS workspace
        run: |
          if [ ! -d "/workdir/ncs/.west" ]; then
            west init -m https://github.com/nrfconnect/sdk-nrf --mr v3.1.1 /workdir/ncs
            cd /workdir/ncs && west update --narrow -o=--depth=1
            west zephyr-export
          else
            echo "NCS already cached, skipping west init/update"
          fi

      - name: Build for nRF52840DK
        run: |
          cd /workdir/ncs
          west build \
            -b nrf52840dk/nrf52840 \
            $GITHUB_WORKSPACE/project \
            --sysbuild \
            -d /workdir/build

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: matter-nrf52840-firmware
          path: |
            /workdir/build/zephyr/zephyr.hex
            /workdir/build/zephyr/zephyr.elf
            /workdir/build/merged.hex
          retention-days: 30
