name: Build Matter nRF52840

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.1.1

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          path: project

      - name: Cache NCS west modules
        uses: actions/cache@v4
        with:
          path: /workdir/ncs
          key: ncs-v3.1.1-${{ runner.os }}
          restore-keys: |
            ncs-v3.1.1-

      - name: Find and setup west
        run: |
          echo "=== PATH ==="
          echo "$PATH"
          echo "=== Finding west ==="
          find /usr /opt /workdir /root /home -name "west" -type f 2>/dev/null | head -10 || true
          echo "=== Finding python3 ==="
          find /usr /opt /workdir -name "python3" -type f 2>/dev/null | head -5 || true
          echo "=== nrfutil ==="
          which nrfutil || true
          echo "=== ls /workdir ==="
          ls /workdir/ 2>/dev/null || echo "(pusty lub brak)"
          echo "=== ls /opt ==="
          ls /opt/ 2>/dev/null || echo "(pusty lub brak)"

      - name: Initialize NCS workspace
        run: |
          # Próbuj różne znane lokalizacje west w kontenerze nRF
          WEST_CMD=""
          for p in \
            /workdir/.venv/bin/west \
            /usr/local/bin/west \
            /usr/bin/west \
            /opt/nordic/ncs/v3.1.1/bin/west \
            $(find /opt /workdir /usr -name "west" -type f 2>/dev/null | head -1)
          do
            if [ -f "$p" ]; then
              WEST_CMD="$p"
              break
            fi
          done

          if [ -z "$WEST_CMD" ]; then
            echo "west nie znaleziony — instaluję przez pip"
            python3 -m pip install west
            WEST_CMD="west"
          fi

          echo "Używam west: $WEST_CMD"

          if [ ! -d "/workdir/ncs/.west" ]; then
            $WEST_CMD init -m https://github.com/nrfconnect/sdk-nrf --mr v3.1.1 /workdir/ncs
            cd /workdir/ncs && $WEST_CMD update --narrow -o=--depth=1
            $WEST_CMD zephyr-export
          else
            echo "NCS already cached, skipping west init/update"
          fi

      - name: Build for nRF52840DK
        run: |
          WEST_CMD=""
          for p in \
            /workdir/.venv/bin/west \
            /usr/local/bin/west \
            /usr/bin/west \
            /opt/nordic/ncs/v3.1.1/bin/west \
            $(find /opt /workdir /usr -name "west" -type f 2>/dev/null | head -1)
          do
            if [ -f "$p" ]; then
              WEST_CMD="$p"
              break
            fi
          done
          [ -z "$WEST_CMD" ] && WEST_CMD="west"

          PROJECT_PATH="$(pwd)/project"
          echo "Buduje z: $PROJECT_PATH"
          echo "Używam west: $WEST_CMD"

          cd /workdir/ncs
          $WEST_CMD build \
            -b nrf52840dk/nrf52840 \
            "$PROJECT_PATH" \
            --sysbuild \
            -d /workdir/build

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: matter-nrf52840-firmware
          path: |
            /workdir/build/zephyr/zephyr.hex
            /workdir/build/zephyr/zephyr.elf
            /workdir/build/merged.hex
          retention-days: 30
